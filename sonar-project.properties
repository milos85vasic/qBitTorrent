# SonarQube project config for qBittorrent-Fixed.
# See docs/SCANNING.md for how this is invoked.

sonar.projectKey=qbittorrent-fixed
sonar.projectName=qBittorrent-Fixed
sonar.projectVersion=0.1.0

sonar.sources=download-proxy/src,plugins,frontend/src
sonar.tests=tests,frontend/src

sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=junit.xml

sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

sonar.exclusions=**/__pycache__/**,**/node_modules/**,**/dist/**,**/htmlcov/**,**/*.min.js,**/ui/dist/**,plugins/webui_compatible/**
sonar.test.inclusions=tests/**,frontend/**/*.spec.ts

sonar.coverage.exclusions=**/__init__.py,plugins/webui_compatible/**,download-proxy/src/ui/**
sonar.cpd.exclusions=plugins/**,frontend/src/app/components/**/*.spec.ts

sonar.sourceEncoding=UTF-8
sonar.scm.provider=git
