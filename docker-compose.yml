version: '3.8'
services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000                                 # Your UID (run `id -u` to check)
      - PGID=1000                                 # Your GID (run `id -g` to check)
      - TZ=Europe/Moscow                          # Set your timezone
      - WEBUI_PORT=8085                           # Web UI port (inside container)
      - WEBUI_USERNAME=admin                      # Web UI username
      - WEBUI_PASSWORD=admin                      # Web UI password (change this!)
      - RUTRACKER_USERNAME=${RUTRACKER_USERNAME}  # RuTracker username for plugin
      - RUTRACKER_PASSWORD=${RUTRACKER_PASSWORD}  # RuTracker password for plugin
    volumes:
      - ./config:/config                          # Stores settings
      - ${QBITTORRENT_DATA_DIR:-/mnt/DATA}:/downloads  # Data directory (configurable via QBITTORRENT_DATA_DIR)
    network_mode: host                            # Use host network to bypass VPN completely
    restart: unless-stopped