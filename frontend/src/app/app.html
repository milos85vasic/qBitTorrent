<!--
  Shell template for the legacy `App` standalone component (see app.ts).
  The actually-bootstrapped root is `AppComponent` in app.component.ts —
  this file is kept in sync for parity with the Angular CLI scaffold so
  any test that still imports `App` renders a sane shell instead of the
  placeholder marketing page.
-->
<nav class="app-nav" aria-label="Primary">
  <div class="brand">Боба</div>
  <ul class="nav-links">
    <li>
      <a
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        data-testid="nav-dashboard"
      >Dashboard</a>
    </li>
    <li>
      <a routerLink="/jackett" routerLinkActive="active" data-testid="nav-jackett">Jackett</a>
    </li>
  </ul>
</nav>

<main class="app-main">
  <router-outlet />
</main>
