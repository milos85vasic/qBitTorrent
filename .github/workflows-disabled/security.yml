name: Security Scanning

on:
  schedule:
    # Weekly Monday 04:00 UTC
    - cron: "0 4 * * 1"
  push:
    branches: [main]
    paths:
      - "download-proxy/requirements.txt"
      - "tests/requirements.txt"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "docker-compose.yml"
      - "docker-compose.quality.yml"
      - "plugins/**"
      - "download-proxy/src/**"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: |
          pip install pip-audit
          pip-audit -r download-proxy/requirements.txt -f sarif -o pip-audit.sarif || true
          pip-audit -r tests/requirements.txt -f sarif -o pip-audit-tests.sarif || true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: pip-audit.sarif
          category: pip-audit-runtime

  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: |
          pip install "bandit[toml]"
          bandit -r download-proxy/src plugins -c pyproject.toml -f sarif -o bandit.sarif || true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit.sarif
          category: bandit

  semgrep:
    runs-on: ubuntu-latest
    container: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep scan --config=auto --sarif -o semgrep.sarif || true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

  snyk:
    runs-on: ubuntu-latest
    if: ${{ env.SNYK_TOKEN != '' }}
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: snyk/actions/setup@master
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install -r download-proxy/requirements.txt
      - run: snyk test --file=download-proxy/requirements.txt --sarif > snyk.sarif || true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif
          category: snyk

  sonarqube:
    runs-on: ubuntu-latest
    if: ${{ env.SONAR_TOKEN != '' }}
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: SonarSource/sonarqube-scan-action@master
