name: Unit Tests

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: unit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt
          # Install runtime deps so download-proxy modules import
          pip install -r download-proxy/requirements.txt

      - name: run unit tests with coverage
        env:
          MODE: mock
        run: |
          python -m pytest tests/unit/ \
            -p no:cacheprovider \
            --cov=download-proxy/src \
            --cov=plugins \
            --cov-report=xml \
            --cov-report=term \
            -W error::DeprecationWarning

      - name: upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: warn

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci --no-audit --no-fund

      - name: ng lint (if configured)
        run: npx ng lint || echo "lint not configured yet"

      - name: unit tests (vitest)
        run: npx ng test --watch=false --browsers=ChromeHeadless || npx vitest run
