name: Syntax

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: syntax-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n on every shell script
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r f; do
            if ! bash -n "$f"; then
              echo "::error file=$f::bash syntax error"
              fail=1
            fi
          done < <(git ls-files '*.sh')
          exit "$fail"
      - name: shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          ignore_paths: >
            download-proxy
            frontend
            .specify
            .worktrees

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: ruff check
        run: |
          pip install "ruff>=0.6.0"
          ruff check . --output-format=github
      - name: ruff format check
        run: ruff format --check .
      - name: py_compile every .py file
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r f; do
            if ! python3 -m py_compile "$f"; then
              echo "::error file=$f::python syntax error"
              fail=1
            fi
          done < <(git ls-files '*.py')
          exit "$fail"

  yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: yamllint
        uses: ibiqlik/action-yamllint@v3

  dockerfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: hadolint (if Dockerfile exists)
        run: |
          if ls Dockerfile* 2>/dev/null | head -1 >/dev/null; then
            docker run --rm -i hadolint/hadolint < Dockerfile || true
          else
            echo "no Dockerfile — skipping"
          fi
