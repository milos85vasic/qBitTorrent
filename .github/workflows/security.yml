name: Security Scanning

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
permissions:
  contents: read
  security-events: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: ruff check
        run: |
          pip install "ruff>=0.6.0"
          ruff check . --output-format=github

  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: bandit scan
        run: |
          pip install "bandit[toml]"
          bandit -r download-proxy/src/ -c pyproject.toml -f sarif -o bandit.sarif || true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit.sarif
          category: bandit

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r download-proxy/requirements.txt -f sarif -o pip-audit.sarif || true
          pip-audit -r tests/requirements.txt -f sarif -o pip-audit-tests.sarif || true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: pip-audit.sarif
          category: pip-audit-runtime
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: pip-audit-tests.sarif
          category: pip-audit-tests
