name: Unit Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: unit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt
          pip install -r download-proxy/requirements.txt

      - name: run unit + contract + property + concurrency + memory + observability tests
        env:
          MODE: mock
        run: |
          python -m pytest tests/unit/ tests/contract/ tests/property/ tests/concurrency/ tests/memory/ tests/observability/ \
            -v --import-mode=importlib \
            -p no:cacheprovider \
            -m "not requires_compose" \
            --cov=download-proxy/src \
            --cov=plugins \
            --cov-report=xml \
            --cov-report=term

      - name: upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: warn

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci --no-audit --no-fund

      - name: unit tests (Angular builder)
        run: npx ng test --watch=false
