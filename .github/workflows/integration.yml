name: Integration Tests

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt
          pip install -r download-proxy/requirements.txt

      - name: start stack
        run: |
          set -euo pipefail
          # GitHub runners ship Docker Compose v2 via `docker compose`.
          docker compose -f docker-compose.yml up -d --build
          # wait for merge service health endpoint
          for i in {1..60}; do
            if curl -sf http://localhost:7187/health >/dev/null; then
              echo "merge-search healthy after ${i}s"
              break
            fi
            sleep 1
          done

      - name: run integration tests
        env:
          MERGE_SERVICE_URL: http://localhost:7187
          QBITTORRENT_URL: http://localhost:7186
        run: |
          python -m pytest tests/integration/ tests/e2e/ \
            -p no:cacheprovider \
            --cov=download-proxy/src \
            --cov-append \
            --cov-report=xml \
            -m "not requires_credentials and not stress"

      - name: docker-compose config validation
        if: always()
        run: |
          docker compose -f docker-compose.yml config --quiet
          if [ -f docker-compose.quality.yml ]; then
            docker compose -f docker-compose.quality.yml config --quiet
          fi

      - name: stop stack
        if: always()
        run: docker compose -f docker-compose.yml down -v

      - name: upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage.xml
          if-no-files-found: warn
