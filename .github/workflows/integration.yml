name: Integration Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt
          pip install -r download-proxy/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: build Angular dashboard
        run: |
          cd frontend
          npm ci
          npx ng build --configuration production

      - name: install Playwright browsers
        run: python -m playwright install chromium

      - name: detect container runtime
        id: runtime
        run: |
          if command -v podman >/dev/null 2>&1; then
            echo "runtime=podman" >> "$GITHUB_OUTPUT"
          else
            echo "runtime=docker" >> "$GITHUB_OUTPUT"
          fi

      - name: start stack
        run: |
          set -euo pipefail
          # GitHub runners ship Docker Compose v2 via `docker compose`.
          # Start qbittorrent first so it creates nova3/ search infrastructure.
          docker compose -f docker-compose.yml up -d --build qbittorrent
          # Wait for qbittorrent to be healthy and create nova3/ files.
          for i in {1..60}; do
            if curl -sf http://localhost:7185/ >/dev/null 2>&1; then
              echo "qbittorrent ready after ${i}s"
              break
            fi
            sleep 1
          done
          # Trigger qBittorrent to initialise nova3/ (helpers.py, novaprinter.py etc.)
          curl -sf http://localhost:7185/api/v2/auth/login \
            -X POST -d "username=admin&password=admin" \
            -c /tmp/qb_cookie.txt >/dev/null
          curl -sf http://localhost:7185/api/v2/search/plugins \
            -b /tmp/qb_cookie.txt >/dev/null || true
          # Wait for qBittorrent to write the standard nova3 files.
          for i in {1..30}; do
            if docker compose -f docker-compose.yml exec -T qbittorrent \
               test -f /config/qBittorrent/nova3/novaprinter.py; then
              echo "nova3 ready after ${i}s"
              break
            fi
            sleep 1
          done
          # Overwrite qBittorrent's support files with our versions
          # (our plugins depend on helpers.py extensions like build_magnet_link).
          docker compose -f docker-compose.yml cp plugins/helpers.py qbittorrent:/config/qBittorrent/nova3/helpers.py
          docker compose -f docker-compose.yml cp plugins/novaprinter.py qbittorrent:/config/qBittorrent/nova3/novaprinter.py
          # Copy tracker plugins into engines/ (flatten community/ into engines/).
          # Use tar + docker compose exec to avoid host permission issues.
          mkdir -p /tmp/ci-plugins
          cp plugins/*.py /tmp/ci-plugins/ 2>/dev/null || true
          cp plugins/community/*.py /tmp/ci-plugins/ 2>/dev/null || true
          # Remove support files and non-tracker modules.
          rm -f /tmp/ci-plugins/helpers.py /tmp/ci-plugins/nova2.py \
            /tmp/ci-plugins/novaprinter.py /tmp/ci-plugins/socks.py \
            /tmp/ci-plugins/download_proxy.py /tmp/ci-plugins/env_loader.py \
            /tmp/ci-plugins/theme_injector.py
          tar czf - -C /tmp/ci-plugins . | \
            docker compose -f docker-compose.yml exec -T qbittorrent sh -c \
            'mkdir -p /config/qBittorrent/nova3/engines && tar xzf - -C /config/qBittorrent/nova3/engines && chmod 644 /config/qBittorrent/nova3/engines/*.py'
          # Start download-proxy (depends on qbittorrent health).
          docker compose -f docker-compose.yml up -d download-proxy
          # Wait for all required ports before running tests.
          wait_for_port() {
            local port=$1
            local path=$2
            for i in {1..60}; do
              if curl -sf "http://localhost:${port}${path}" >/dev/null 2>&1; then
                echo "port ${port} ready after ${i}s"
                return 0
              fi
              sleep 1
            done
            echo "port ${port} did not become ready within 60s" >&2
            return 1
          }
          wait_for_port 7186 "/" || exit 1
          wait_for_port 7187 "/health" || exit 1

      - name: run integration + e2e tests
        env:
          MERGE_SERVICE_URL: http://localhost:7187
          QBITTORRENT_URL: http://localhost:7186
          CONTAINER_RUNTIME: docker
        run: |
          python -m pytest tests/integration/ tests/e2e/ \
            -v --import-mode=importlib \
            -p no:cacheprovider \
            --cov=download-proxy/src \
            --cov-append \
            --cov-report=xml \
            -m "not requires_credentials and not stress"

      - name: docker-compose config validation
        if: always()
        run: |
          docker compose -f docker-compose.yml config --quiet
          if [ -f docker-compose.quality.yml ]; then
            docker compose -f docker-compose.quality.yml config --quiet
          fi

      - name: stop stack
        if: always()
        run: docker compose -f docker-compose.yml down -v

      - name: upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage.xml
          if-no-files-found: warn
