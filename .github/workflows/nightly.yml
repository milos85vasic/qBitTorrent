name: Nightly Full Suite

on:
  schedule:
    # 03:30 UTC — after upstream packages typically re-index
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt
          pip install -r download-proxy/requirements.txt

      - name: start stack
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml up -d --build
          for i in {1..60}; do
            curl -sf http://localhost:7187/health >/dev/null && break
            sleep 1
          done

      - name: full pytest (unit + integration + e2e + stress + performance)
        env:
          MERGE_SERVICE_URL: http://localhost:7187
          QBITTORRENT_URL: http://localhost:7186
        run: |
          python -m pytest tests/ \
            --cov=download-proxy/src \
            --cov=plugins \
            --cov-report=xml \
            --cov-report=html \
            -m "not requires_credentials"

      - name: mutation tests (sampled)
        run: |
          pip install mutmut
          mutmut run --paths-to-mutate download-proxy/src/merge_service --max-children 4 --simple-output || true
          mutmut results || true

      - name: stop stack
        if: always()
        run: docker compose -f docker-compose.yml down -v

      - name: upload full-suite coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-nightly
          path: |
            coverage.xml
            htmlcov/
