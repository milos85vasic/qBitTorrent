name: Nightly Full Suite

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
permissions:
  contents: read

jobs:
  full:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt
          pip install -r download-proxy/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: build Angular dashboard
        run: |
          cd frontend
          npm ci
          npx ng build --configuration production

      - name: prepare proxy infrastructure
        run: |
          mkdir -p config/qBittorrent/nova3/engines
          cp plugins/download_proxy.py config/qBittorrent/nova3/engines/
          cp plugins/env_loader.py config/qBittorrent/nova3/engines/
          cp plugins/helpers.py config/qBittorrent/nova3/engines/
          cp plugins/novaprinter.py config/qBittorrent/nova3/novaprinter.py

      - name: start stack
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml up -d --build
          for i in {1..60}; do
            curl -sf http://localhost:7187/health >/dev/null && break
            sleep 1
          done

      - name: full CI suite
        env:
          CONTAINER_RUNTIME: docker
        run: ./ci.sh

      - name: stop stack
        if: always()
        run: docker compose -f docker-compose.yml down -v

      - name: upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-nightly
          path: |
            coverage.xml
            htmlcov/
