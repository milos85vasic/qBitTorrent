# Merge Service Configuration

# Search Settings
search:
  # Maximum time to wait for a single tracker response (seconds)
  tracker_timeout: 10
  # Maximum results to return per tracker
  max_results_per_tracker: 100
  # Maximum merged results to return
  max_merged_results: 50
  # Enable SSE streaming
  enable_streaming: true
  # Streaming update interval (milliseconds)
  streaming_interval: 500

# Deduplication Settings
deduplication:
  # Size tolerance in MB for "exact" size match
  size_tolerance_mb: 50
  # Minimum similarity threshold for fuzzy matching (0.0-1.0)
  similarity_threshold: 0.85
  # Enable metadata-based matching (requires API keys)
  enable_metadata_match: true

# Tracker Validation Settings
validation:
  # Enable tracker health validation
  enabled: true
  # Cache TTL for validation results (seconds)
  cache_ttl: 300
  # HTTP scrape timeout (seconds)
  http_timeout: 10
  # UDP scrape timeout (seconds)
  udp_timeout: 5
  # Enable UDP fallback
  enable_udp_fallback: true

# Metadata API Settings
metadata:
  # Enable metadata enrichment
  enabled: true
  # API keys (set via environment variables)
  # OMDB_API_KEY
  # TMDB_API_KEY
  # ANILIST_CLIENT_ID
  # Rate limiting
  rate_limit_per_second: 1
  # Cache TTL (seconds)
  cache_ttl: 3600

# Hooks Settings
hooks:
  enabled: true
  # Default hook script directory
  script_directory: /config/hooks
  # Hook timeout (seconds)
  timeout: 30
  # Enable logging
  log_enabled: true

# Scheduling Settings
scheduling:
  enabled: true
  # Config file for scheduled searches
  config_file: /config/merge-service/scheduling.yaml
  # Default schedule interval (minutes)
  default_interval: 60

# Download Settings
download:
  # Wire all tracker URLs to qBittorrent
  wire_all_urls: true
  # Maximum concurrent downloads
  max_concurrent: 5
  # Auto-start downloads
  auto_start: false