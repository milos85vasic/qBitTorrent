<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge Search - Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: #16213e; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #0f3460; display: flex; justify-content: space-between; align-items: center; }
        h1 { color: #e94560; font-size: 24px; }
        .card { background: #16213e; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #0f3460; }
        .card h2 { color: #e94560; font-size: 18px; margin-bottom: 15px; }
        .search-form { display: flex; gap: 10px; margin-bottom: 10px; }
        .search-form input { flex: 1; padding: 12px; border: 1px solid #0f3460; border-radius: 6px; font-size: 16px; background: #1a1a2e; color: #e0e0e0; }
        .search-form input:focus { outline: none; border-color: #e94560; }
        .search-form button { padding: 12px 24px; background: #e94560; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
        .search-form button:hover { background: #c73652; }
        .search-form button:disabled { background: #555; cursor: not-allowed; }
        #search-status { color: #888; font-size: 14px; margin-top: 5px; }
        .results-table { width: 100%; border-collapse: collapse; }
        .results-table th, .results-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #0f3460; }
        .results-table th { color: #e94560; font-weight: 600; }
        .results-table tr:hover { background: #0f3460; }
        .download-btn { padding: 6px 14px; background: #28a745; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .download-btn:hover { background: #218838; }
        .download-btn:disabled { background: #555; cursor: not-allowed; }
        .tabs { display: flex; border-bottom: 2px solid #0f3460; margin-bottom: 20px; }
        .tab { padding: 12px 24px; cursor: pointer; border: none; background: none; font-size: 14px; color: #888; }
        .tab.active { border-bottom: 2px solid #e94560; color: #e94560; font-weight: 600; }
        .tab:hover { color: #e0e0e0; }
        .status { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; }
        .status.running { background: #fff3cd; color: #856404; }
        .status.completed { background: #28a745; color: #fff; }
        .status.failed { background: #dc3545; color: #fff; }
        .status.healthy { background: #28a745; color: #fff; }
        .status.unknown { background: #555; color: #ccc; }
        .status.downloading { background: #17a2b8; color: #fff; }
        .status.seeding { background: #28a745; color: #fff; }
        .status.paused { background: #ffc107; color: #333; }
        .status.captcha_required { background: #dc3545; color: #fff; }
        .empty-state { color: #555; text-align: center; padding: 40px; }
        .stats-bar { display: flex; gap: 20px; margin-bottom: 15px; }
        .stat-item { background: #1a1a2e; padding: 12px 20px; border-radius: 6px; border: 1px solid #0f3460; }
        .stat-item .stat-value { font-size: 24px; font-weight: 700; color: #e94560; }
        .stat-item .stat-label { font-size: 12px; color: #888; }
        .tracker-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; background: #0f3460; color: #e0e0e0; margin-right: 4px; }
        .tracker-tag.freeleech { background: #28a745; }
        .progress-bar { width: 100%; height: 6px; background: #1a1a2e; border-radius: 3px; overflow: hidden; }
        .progress-bar .fill { height: 100%; background: #e94560; border-radius: 3px; transition: width 0.3s; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #555; border-top-color: #e94560; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
        .auth-section { display: flex; align-items: center; gap: 12px; }
        .auth-btn { padding: 8px 16px; border-radius: 6px; border: 1px solid #0f3460; background: #1a1a2e; color: #e0e0e0; cursor: pointer; font-size: 13px; }
        .auth-btn:hover { border-color: #e94560; }
        .auth-indicator { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; }
        .auth-indicator.active { background: #28a745; }
        .auth-indicator.inactive { background: #dc3545; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: #16213e; padding: 30px; border-radius: 12px; border: 1px solid #0f3460; max-width: 420px; width: 90%; }
        .modal h3 { color: #e94560; margin-bottom: 15px; font-size: 18px; }
        .modal img { max-width: 100%; border-radius: 6px; margin-bottom: 15px; background: #fff; }
        .modal input[type="text"] { width: 100%; padding: 12px; border: 1px solid #0f3460; border-radius: 6px; font-size: 16px; background: #1a1a2e; color: #e0e0e0; margin-bottom: 15px; }
        .modal input[type="text"]:focus { outline: none; border-color: #e94560; }
        .modal-actions { display: flex; gap: 10px; }
        .modal-actions button { flex: 1; padding: 10px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; }
        .modal-actions .submit-btn { background: #e94560; color: #fff; }
        .modal-actions .submit-btn:hover { background: #c73652; }
        .modal-actions .cancel-btn { background: #333; color: #ccc; }
        .modal-actions .cancel-btn:hover { background: #444; }
        .modal-actions .submit-btn:disabled { background: #555; cursor: not-allowed; }
        .modal .error-msg { color: #dc3545; font-size: 13px; margin-top: 8px; display: none; }
        .cookie-section { margin-top: 15px; padding-top: 15px; border-top: 1px solid #0f3460; }
        .cookie-section textarea { width: 100%; padding: 10px; border: 1px solid #0f3460; border-radius: 6px; font-size: 13px; background: #1a1a2e; color: #e0e0e0; margin-bottom: 10px; min-height: 60px; font-family: monospace; }
        .cookie-section textarea:focus { outline: none; border-color: #e94560; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Merge Search Dashboard</h1>
            <div class="auth-section">
                <span id="auth-status"><span class="auth-indicator inactive"></span>RuTracker</span>
                <button class="auth-btn" onclick="openCaptchaModal()">Login</button>
            </div>
        </header>

        <div class="card">
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-value" id="stat-active">0</div>
                    <div class="stat-label">Active Searches</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-completed">0</div>
                    <div class="stat-label">Completed</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-trackers">0</div>
                    <div class="stat-label">Trackers</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Search</h2>
            <form class="search-form" id="search-form" onsubmit="doSearch(event)">
                <input type="text" id="search-query" placeholder="Enter search query (e.g., Ubuntu 22.04)" required>
                <button type="submit" id="search-btn">Search</button>
            </form>
            <div id="search-status"></div>
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('results', this)">Results</button>
                <button class="tab" onclick="switchTab('downloads', this)">Active Downloads</button>
                <button class="tab" onclick="switchTab('trackers', this)">Trackers</button>
            </div>

            <div id="results-tab">
                <p class="empty-state">No search results yet. Enter a query above.</p>
            </div>

            <div id="downloads-tab" style="display:none;">
                <p class="empty-state">No active downloads</p>
            </div>

            <div id="trackers-tab" style="display:none;">
                <table class="results-table">
                    <thead>
                        <tr><th>Tracker</th><th>URL</th><th>Status</th></tr>
                    </thead>
                    <tbody id="trackers-body">
                        <tr><td colspan="3" class="empty-state">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="captcha-modal">
        <div class="modal">
            <h3>RuTracker Authentication</h3>
            <div id="captcha-loading"><span class="spinner"></span>Fetching CAPTCHA...</div>
            <div id="captcha-content" style="display:none;">
                <img id="captcha-image" src="" alt="CAPTCHA">
                <input type="text" id="captcha-input" placeholder="Enter the text from the image">
                <div class="error-msg" id="captcha-error"></div>
                <div class="modal-actions">
                    <button class="cancel-btn" onclick="closeCaptchaModal()">Cancel</button>
                    <button class="submit-btn" id="captcha-submit" onclick="submitCaptcha()">Submit</button>
                </div>
            </div>
            <div id="captcha-success" style="display:none;">
                <p style="color: #28a745; margin-bottom: 15px;">Successfully authenticated!</p>
                <div class="modal-actions">
                    <button class="submit-btn" onclick="closeCaptchaModal()">Close</button>
                </div>
            </div>
            <div class="cookie-section">
                <p style="color: #888; font-size: 12px; margin-bottom: 8px;">Or paste cookies from your browser:</p>
                <textarea id="cookie-input" placeholder="bb_session=xxx; phpbb2mysql_4_sid=xxx; ..."></textarea>
                <div class="modal-actions">
                    <button class="submit-btn" onclick="submitCookies()">Use Cookies</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        var _captchaToken = '';
        var _capSid = '';
        var _capCodeField = '';
        var _lastResults = null;

        function switchTab(name, el) {
            document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
            el.classList.add('active');
            document.querySelectorAll('[id$="-tab"]').forEach(function(t) { t.style.display = 'none'; });
            document.getElementById(name + '-tab').style.display = 'block';
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            var units = ['B', 'KB', 'MB', 'GB', 'TB'];
            var i = Math.floor(Math.log(bytes) / Math.log(1024));
            return (bytes / Math.pow(1024, i)).toFixed(1) + ' ' + units[i];
        }

        function formatSpeed(bps) {
            return formatSize(bps) + '/s';
        }

        function formatETA(seconds) {
            if (seconds >= 8640000) return '-';
            var h = Math.floor(seconds / 3600);
            var m = Math.floor((seconds % 3600) / 60);
            var s = seconds % 60;
            return (h > 0 ? h + 'h ' : '') + (m > 0 ? m + 'm ' : '') + s + 's';
        }

        function doSearch(e) {
            e.preventDefault();
            var query = document.getElementById('search-query').value;
            var btn = document.getElementById('search-btn');
            var status = document.getElementById('search-status');
            btn.disabled = true;
            status.innerHTML = '<span class="spinner"></span>Searching...';

            fetch('/api/v1/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: query })
            })
            .then(function(r) {
                if (r.status === 403) {
                    return r.json().then(function(data) {
                        btn.disabled = false;
                        if (data.status === 'captcha_required') {
                            status.innerHTML = '<span style="color:#dc3545">RuTracker CAPTCHA required. <a href="#" onclick="openCaptchaModal(); return false;" style="color:#e94560">Solve CAPTCHA</a></span>';
                        }
                        return null;
                    });
                }
                return r.json();
            })
            .then(function(data) {
                if (!data) return;
                btn.disabled = false;
                if (data.results && data.results.length > 0) {
                    status.textContent = 'Found ' + data.total_results + ' results (' + data.merged_results + ' merged) from ' + data.trackers_searched.join(', ');
                    renderResults(data.results);
                } else {
                    status.textContent = 'No results found.';
                    document.getElementById('results-tab').innerHTML = '<p class="empty-state">No results found for "' + escapeHtml(query) + '"</p>';
                }
                loadStats();
            })
            .catch(function(err) {
                btn.disabled = false;
                status.textContent = 'Error: ' + err.message;
            });
        }

        function renderResults(results) {
            var html = '<table class="results-table"><thead><tr>' +
                '<th>Name</th><th>Size</th><th>Seeds</th><th>Leechers</th><th>Tracker</th><th>Action</th>' +
                '</tr></thead><tbody>';
            results.forEach(function(r, i) {
                var trackerClass = r.tracker && r.tracker.indexOf('[free]') !== -1 ? 'tracker-tag freeleech' : 'tracker-tag';
                html += '<tr>' +
                    '<td>' + escapeHtml(r.name) + '</td>' +
                    '<td>' + escapeHtml(r.size) + '</td>' +
                    '<td>' + r.seeds + '</td>' +
                    '<td>' + r.leechers + '</td>' +
                    '<td><span class="' + trackerClass + '">' + escapeHtml(r.tracker || 'unknown') + '</span></td>' +
                    '<td><button class="download-btn" onclick="doDownload(' + i + ')">Download</button></td>' +
                    '</tr>';
            });
            html += '</tbody></table>';
            document.getElementById('results-tab').innerHTML = html;
            _lastResults = results;
        }

        function doDownload(index) {
            var results = _lastResults;
            if (!results || !results[index]) return;
            var r = results[index];
            var btn = event.target;
            btn.disabled = true;
            btn.textContent = 'Adding...';

            fetch('/api/v1/download', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ result_id: String(index), download_urls: r.download_urls })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.status === 'initiated') {
                    btn.textContent = 'Added';
                    btn.style.background = '#28a745';
                } else {
                    btn.textContent = 'Failed';
                    btn.style.background = '#dc3545';
                }
            })
            .catch(function(err) {
                btn.textContent = 'Error';
                btn.style.background = '#dc3545';
            });
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(text || ''));
            return div.innerHTML;
        }

        function loadStats() {
            fetch('/api/v1/stats')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                document.getElementById('stat-active').textContent = data.active_searches;
                document.getElementById('stat-completed').textContent = data.completed_searches;
                document.getElementById('stat-trackers').textContent = data.trackers_count;
                renderTrackers(data.trackers || []);
            })
            .catch(function() {});
        }

        function renderTrackers(trackers) {
            var body = document.getElementById('trackers-body');
            if (trackers.length === 0) {
                body.innerHTML = '<tr><td colspan="3" class="empty-state">No trackers configured</td></tr>';
                return;
            }
            var html = '';
            trackers.forEach(function(t) {
                html += '<tr>' +
                    '<td>' + escapeHtml(t.name) + '</td>' +
                    '<td>' + escapeHtml(t.url) + '</td>' +
                    '<td><span class="status healthy">Enabled</span></td>' +
                    '</tr>';
            });
            body.innerHTML = html;
        }

        function loadDownloads() {
            fetch('/api/v1/downloads/active')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var tab = document.getElementById('downloads-tab');
                var downloads = data.downloads || [];
                if (downloads.length === 0) {
                    tab.innerHTML = '<p class="empty-state">No active downloads</p>';
                    return;
                }
                var html = '<table class="results-table"><thead><tr>' +
                    '<th>Name</th><th>Size</th><th>Progress</th><th>Speed</th><th>ETA</th><th>State</th>' +
                    '</tr></thead><tbody>';
                downloads.forEach(function(d) {
                    var stateClass = d.state || 'unknown';
                    if (stateClass === 'stalledDL' || stateClass === 'forcedDL' || stateClass === 'downloading') stateClass = 'downloading';
                    else if (stateClass === 'uploading' || stateClass === 'stalledUP' || stateClass === 'forcedUP') stateClass = 'seeding';
                    else if (stateClass === 'pausedDL' || stateClass === 'pausedUP') stateClass = 'paused';
                    else stateClass = 'unknown';
                    html += '<tr>' +
                        '<td>' + escapeHtml(d.name) + '</td>' +
                        '<td>' + formatSize(d.size) + '</td>' +
                        '<td><div class="progress-bar"><div class="fill" style="width:' + d.progress + '%"></div></div>' + d.progress + '%</td>' +
                        '<td>' + formatSpeed(d.dlspeed) + '</td>' +
                        '<td>' + formatETA(d.eta) + '</td>' +
                        '<td><span class="status ' + stateClass + '">' + escapeHtml(d.state) + '</span></td>' +
                        '</tr>';
                });
                html += '</tbody></table>';
                tab.innerHTML = html;
            })
            .catch(function() {});
        }

        function checkAuthStatus() {
            fetch('/api/v1/auth/rutracker/status')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var el = document.getElementById('auth-status');
                if (data.authenticated) {
                    el.innerHTML = '<span class="auth-indicator active"></span>RuTracker';
                } else {
                    el.innerHTML = '<span class="auth-indicator inactive"></span>RuTracker';
                }
            })
            .catch(function() {});
        }

        function openCaptchaModal() {
            document.getElementById('captcha-modal').classList.add('show');
            document.getElementById('captcha-loading').style.display = 'block';
            document.getElementById('captcha-content').style.display = 'none';
            document.getElementById('captcha-success').style.display = 'none';
            document.getElementById('captcha-error').style.display = 'none';

            fetch('/api/v1/auth/rutracker/captcha')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                document.getElementById('captcha-loading').style.display = 'none';
                if (data.authenticated) {
                    document.getElementById('captcha-success').style.display = 'block';
                    checkAuthStatus();
                    return;
                }
                if (!data.captcha_required) {
                    document.getElementById('captcha-error').textContent = data.message || 'No CAPTCHA found. Try again.';
                    document.getElementById('captcha-error').style.display = 'block';
                    document.getElementById('captcha-content').style.display = 'block';
                    return;
                }
                document.getElementById('captcha-image').src = data.captcha_image;
                _captchaToken = data.captcha_token;
                document.getElementById('captcha-input').value = '';
                document.getElementById('captcha-content').style.display = 'block';
                document.getElementById('captcha-input').focus();
            })
            .catch(function(err) {
                document.getElementById('captcha-loading').style.display = 'none';
                document.getElementById('captcha-error').textContent = 'Failed to fetch CAPTCHA: ' + err.message;
                document.getElementById('captcha-error').style.display = 'block';
            });
        }

        function closeCaptchaModal() {
            document.getElementById('captcha-modal').classList.remove('show');
        }

        function submitCaptcha() {
            var text = document.getElementById('captcha-input').value.trim();
            if (!text) return;

            var btn = document.getElementById('captcha-submit');
            btn.disabled = true;
            btn.textContent = 'Submitting...';

            fetch('/api/v1/auth/rutracker/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    cap_sid: '',
                    cap_code_field: '',
                    captcha_text: text,
                    captcha_token: _captchaToken
                })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                btn.disabled = false;
                btn.textContent = 'Submit';

                if (data.authenticated) {
                    document.getElementById('captcha-content').style.display = 'none';
                    document.getElementById('captcha-success').style.display = 'block';
                    checkAuthStatus();
                    return;
                }

                if (data.captcha_required && data.captcha_image) {
                    document.getElementById('captcha-image').src = data.captcha_image;
                    _captchaToken = data.captcha_token;
                    document.getElementById('captcha-input').value = '';
                    document.getElementById('captcha-error').textContent = 'Wrong CAPTCHA. Try again.';
                    document.getElementById('captcha-error').style.display = 'block';
                    return;
                }

                document.getElementById('captcha-error').textContent = data.message || 'Login failed.';
                document.getElementById('captcha-error').style.display = 'block';
            })
            .catch(function(err) {
                btn.disabled = false;
                btn.textContent = 'Submit';
                document.getElementById('captcha-error').textContent = 'Error: ' + err.message;
                document.getElementById('captcha-error').style.display = 'block';
            });
        }

        function submitCookies() {
            var cookieStr = document.getElementById('cookie-input').value.trim();
            if (!cookieStr) return;

            fetch('/api/v1/auth/rutracker/cookie-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cookie_string: cookieStr })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.authenticated) {
                    document.getElementById('captcha-content').style.display = 'none';
                    document.getElementById('captcha-success').style.display = 'block';
                    checkAuthStatus();
                } else {
                    document.getElementById('captcha-error').textContent = data.detail || 'Cookie login failed.';
                    document.getElementById('captcha-error').style.display = 'block';
                }
            })
            .catch(function(err) {
                document.getElementById('captcha-error').textContent = 'Error: ' + err.message;
                document.getElementById('captcha-error').style.display = 'block';
            });
        }

        document.getElementById('captcha-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                submitCaptcha();
            }
        });

        checkAuthStatus();
        loadStats();
        loadDownloads();
        setInterval(function() { loadStats(); loadDownloads(); checkAuthStatus(); }, 30000);
    </script>
</body>
</html>
